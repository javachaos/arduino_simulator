<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Arduino Simulator Web</title>
    <link data-trunk rel="rust" data-bin="arduino-simulator-web" />
    <style>
      :root {
        color-scheme: dark;
        font-family: "IBM Plex Sans", "Helvetica Neue", sans-serif;
        background:
          radial-gradient(circle at top, rgba(54, 121, 255, 0.16), transparent 36%),
          linear-gradient(180deg, #08111d 0%, #0d1625 54%, #08111d 100%);
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: transparent;
      }

      body {
        min-height: 100vh;
      }

      #app-shell {
        width: 100vw;
        height: 100vh;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div id="app-shell">
      <canvas id="app-canvas"></canvas>
    </div>
  </body>
</html>
